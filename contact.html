            <main class="main">
                <h2>contact</h2>
                <form class="form">
                    <label>Name</label>
                    <input type="text" placeholder="Enter full name">
                    <label>Email</label>
                    <input type="email" placeholder="Enter email">
                    <label>Phone number</label>
                    <input type="tel" placeholder="+7855096201">
                    <label>Date of birth</label>
                    <input type="date">
                    <hr>
                    <label>Gender</label>
                    <input type="radio" name="gender"> Male<br>
                    <input type="radio" name="gender"> Female<br>
                    <input type="radio" name="gender"> I prefer not to say<br>
                    <hr>
                    <label>Preferred intensity</label>
                    <input type="checkbox"> Low Intensity<br>
                    <input type="checkbox"> Medium Intensity<br>
                    <input type="checkbox"> High Intensity<br>
                    <hr>
                    <label>Yoga experience</label>
                    <input type="range">
                    <hr>
                    <label>Message</label>
                    <textarea rows="5" cols="30"></textarea><br><br>
                    <input type="reset" class="button" value="Reset">
                    <input type="submit" class="button" value="Submit">
                </form>
            </main>
